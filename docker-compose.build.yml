services:
  app:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: camera-monitor
    ports:
      - "${PORT:-8088}:8088"
    volumes:
      - camera-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/camera_monitor.db
      - PROJECT_ROOT=/app
      - JWT_SECRET=${JWT_SECRET:-camera-monitor-secret-key-change-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - DETECT_TIMEOUT=${DETECT_TIMEOUT:-5}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  camera-data:
    driver: local
