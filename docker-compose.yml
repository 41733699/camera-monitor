version: '3.8'

services:
  backend:
    build: ./backend
    container_name: camera-monitor-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/camera_monitor.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: camera-monitor-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
